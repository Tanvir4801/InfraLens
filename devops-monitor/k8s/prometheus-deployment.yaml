apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-monitor
  labels:
    app: devops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-monitor
      component: prometheus
  template:
    metadata:
      labels:
        app: devops-monitor
        component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml