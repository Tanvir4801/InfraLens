apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-monitor
  labels:
    app: devops-monitor
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - devops-monitor-service:8000
