<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="InfraLens — AI-Powered DevOps Monitoring">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="InfraLens">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>InfraLens</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── InfraLens browser notification helpers ──────────────────────────────
    // Called from Dart via dart:js_interop

    function infraLensRequestNotifications() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function infraLensShowNotification(title, body) {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;
      try {
        const n = new Notification('\uD83D\uDEA8 ' + title, {
          body: body,
          icon: '/icons/Icon-192.png',
          badge: '/icons/Icon-192.png',
          tag: 'infralens-critical',
          requireInteraction: true,
          silent: false,
        });
        n.onclick = function () { window.focus(); n.close(); };
      } catch (e) { console.warn('InfraLens notification error:', e); }
    }

    function infraLensGetNotificationPermission() {
      if (!('Notification' in window)) return 'unsupported';
      return Notification.permission;
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
