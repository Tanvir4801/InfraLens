groups:
  - name: devops-monitoring-alerts
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: CPU usage is above 80%
          description: CPU usage on {{ $labels.instance }} has been above 80% for 2 minutes.

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        labels:
          severity: warning
        annotations:
          summary: RAM usage is above 85%
          description: RAM usage on {{ $labels.instance }} is above 85%.