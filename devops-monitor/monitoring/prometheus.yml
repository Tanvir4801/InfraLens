global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: fastapi
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - fastapi-backend:8000
